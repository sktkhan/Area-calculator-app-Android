name: Build AdMob APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create complete Android project
      run: |

        # ── ROOT FILES ──────────────────────────────────────

        cat > settings.gradle << 'EOF'
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}
rootProject.name = "AreaCalcApp"
include ':app'
EOF

        cat > gradle.properties << 'EOF'
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true
EOF

        cat > build.gradle << 'EOF'
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.2'
    }
}
allprojects {
    repositories {
        google()
        mavenCentral()
    }
}
EOF

        cat > gradlew << 'GRADLEW'
#!/bin/sh
APP_HOME="$(cd "$(dirname "$0")" && pwd)"
exec "$APP_HOME/gradle/wrapper/gradle-wrapper.jar" "$@" 2>/dev/null || true
GRADLEW

        # ── GRADLE WRAPPER ──────────────────────────────────
        mkdir -p gradle/wrapper
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF
        curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
          -o gradle/wrapper/gradle-wrapper.jar
        chmod +x gradlew

        # ── APP BUILD.GRADLE ────────────────────────────────
        mkdir -p app
        cat > app/build.gradle << 'EOF'
plugins {
    id 'com.android.application'
}
android {
    namespace 'com.akhtar.areacalculator'
    compileSdk 34
    defaultConfig {
        applicationId "com.akhtar.areacalculator"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }
    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
    buildFeatures {
        viewBinding true
    }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.webkit:webkit:1.10.0'
    implementation 'com.google.android.gms:play-services-ads:23.1.0'
}
EOF

        cat > app/proguard-rules.pro << 'EOF'
-keep class com.google.android.gms.ads.** { *; }
-keep class com.akhtar.areacalculator.** { *; }
-keepclassmembers class com.akhtar.areacalculator.MainActivity$AppBridge {
    @android.webkit.JavascriptInterface <methods>;
}
EOF

        # ── DIRECTORIES ─────────────────────────────────────
        mkdir -p app/src/main/java/com/akhtar/areacalculator
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/menu
        mkdir -p app/src/main/res/drawable
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi

        # ── ANDROIDMANIFEST ─────────────────────────────────
        cat > app/src/main/AndroidManifest.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android">
    <uses-permission android:name="android.permission.INTERNET" />
    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
    <application
        android:allowBackup="true"
        android:icon="@mipmap/ic_launcher"
        android:label="@string/app_name"
        android:roundIcon="@mipmap/ic_launcher_round"
        android:supportsRtl="true"
        android:theme="@style/Theme.AreaCalc"
        android:usesCleartextTraffic="false"
        android:networkSecurityConfig="@xml/network_security_config">
        <meta-data
            android:name="com.google.android.gms.ads.APPLICATION_ID"
            android:value="ca-app-pub-4906482552027295~6258543357" />
        <activity
            android:name=".MainActivity"
            android:exported="true"
            android:screenOrientation="portrait"
            android:windowSoftInputMode="adjustResize">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>
        <activity
            android:name=".PrivacyPolicyActivity"
            android:exported="false"
            android:label="@string/privacy_policy"
            android:parentActivityName=".MainActivity" />
    </application>
</manifest>
EOF

        # ── MAINACTIVITY.JAVA ────────────────────────────────
        cat > app/src/main/java/com/akhtar/areacalculator/MainActivity.java << 'EOF'
package com.akhtar.areacalculator;
import android.content.Intent;
import android.os.Bundle;
import android.os.Handler;
import android.os.Looper;
import android.util.Log;
import android.webkit.JavascriptInterface;
import android.webkit.WebSettings;
import android.webkit.WebView;
import android.webkit.WebViewClient;
import android.widget.Toast;
import androidx.annotation.NonNull;
import androidx.appcompat.app.AlertDialog;
import androidx.appcompat.app.AppCompatActivity;
import com.google.android.gms.ads.*;
import com.google.android.gms.ads.interstitial.InterstitialAd;
import com.google.android.gms.ads.interstitial.InterstitialAdLoadCallback;
import com.google.android.gms.ads.rewarded.RewardedAd;
import com.google.android.gms.ads.rewarded.RewardedAdLoadCallback;
import com.akhtar.areacalculator.databinding.ActivityMainBinding;
public class MainActivity extends AppCompatActivity {
    private static final String TAG = "AreaCalc";
    private static final String BANNER_AD_UNIT = "ca-app-pub-4906482552027295/8914672454";
    private static final String INTERSTITIAL_AD_UNIT = "ca-app-pub-4906482552027295/1329650309";
    private static final String REWARDED_AD_UNIT = "ca-app-pub-4906482552027295/2604799413";
    private static final long COOLDOWN = 90_000L;
    private AdView mBannerAd;
    private InterstitialAd mInterstitialAd;
    private RewardedAd mRewardedAd;
    private long mLastInterstitial = 0L;
    private int mCalcCount = 0;
    private ActivityMainBinding binding;
    private WebView mWebView;
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        binding = ActivityMainBinding.inflate(getLayoutInflater());
        setContentView(binding.getRoot());
        setSupportActionBar(binding.toolbar);
        MobileAds.initialize(this, status -> {
            loadBanner(); loadInterstitial(); loadRewarded();
        });
        setupWebView();
    }
    private void setupWebView() {
        mWebView = binding.webView;
        WebSettings s = mWebView.getSettings();
        s.setJavaScriptEnabled(true);
        s.setDomStorageEnabled(true);
        s.setCacheMode(WebSettings.LOAD_NO_CACHE);
        s.setBuiltInZoomControls(false);
        s.setLoadWithOverviewMode(true);
        s.setUseWideViewPort(true);
        mWebView.setWebViewClient(new WebViewClient() {
            @Override public boolean shouldOverrideUrlLoading(WebView v, String url) {
                return !url.startsWith("file://");
            }
        });
        mWebView.addJavascriptInterface(new Bridge(), "AndroidBridge");
        mWebView.loadUrl("file:///android_asset/calculator.html");
    }
    private class Bridge {
        @JavascriptInterface public void onCalculationDone() {
            mCalcCount++;
            if (mCalcCount % 3 == 0)
                new Handler(Looper.getMainLooper()).post(() -> showInterstitial());
        }
        @JavascriptInterface public void onPdfRequested() {
            new Handler(Looper.getMainLooper()).post(() -> showRewardedForPdf());
        }
    }
    private void loadBanner() {
        mBannerAd = new AdView(this);
        mBannerAd.setAdUnitId(BANNER_AD_UNIT);
        mBannerAd.setAdSize(AdSize.BANNER);
        binding.bannerContainer.addView(mBannerAd);
        mBannerAd.loadAd(new AdRequest.Builder().build());
    }
    private void loadInterstitial() {
        InterstitialAd.load(this, INTERSTITIAL_AD_UNIT, new AdRequest.Builder().build(),
            new InterstitialAdLoadCallback() {
                @Override public void onAdLoaded(@NonNull InterstitialAd ad) {
                    mInterstitialAd = ad;
                    ad.setFullScreenContentCallback(new FullScreenContentCallback() {
                        @Override public void onAdDismissedFullScreenContent() {
                            mInterstitialAd = null; loadInterstitial();
                        }
                    });
                }
                @Override public void onAdFailedToLoad(@NonNull LoadAdError e) {
                    mInterstitialAd = null;
                    new Handler(Looper.getMainLooper()).postDelayed(() -> loadInterstitial(), 30000);
                }
            });
    }
    private void showInterstitial() {
        long now = System.currentTimeMillis();
        if (now - mLastInterstitial < COOLDOWN || mInterstitialAd == null) return;
        mLastInterstitial = now;
        mInterstitialAd.show(this);
    }
    private void loadRewarded() {
        RewardedAd.load(this, REWARDED_AD_UNIT, new AdRequest.Builder().build(),
            new RewardedAdLoadCallback() {
                @Override public void onAdLoaded(@NonNull RewardedAd ad) { mRewardedAd = ad; }
                @Override public void onAdFailedToLoad(@NonNull LoadAdError e) { mRewardedAd = null; }
            });
    }
    private void showRewardedForPdf() {
        if (mRewardedAd == null) {
            mWebView.evaluateJavascript("javascript:generatePdfNow()", null);
            loadRewarded(); return;
        }
        new AlertDialog.Builder(this)
            .setTitle("Download PDF Report")
            .setMessage("Watch a short video ad to download your PDF report for free.")
            .setPositiveButton("Watch Ad & Download", (d, w) -> {
                mRewardedAd.show(this, item -> {
                    mWebView.evaluateJavascript("javascript:generatePdfNow()", null);
                    Toast.makeText(this, "PDF ready!", Toast.LENGTH_SHORT).show();
                });
            })
            .setNegativeButton("Cancel", null).show();
    }
    @Override public boolean onCreateOptionsMenu(android.view.Menu menu) {
        getMenuInflater().inflate(R.menu.main_menu, menu); return true;
    }
    @Override public boolean onOptionsItemSelected(@NonNull android.view.MenuItem item) {
        if (item.getItemId() == R.id.action_privacy) {
            startActivity(new Intent(this, PrivacyPolicyActivity.class)); return true;
        }
        return super.onOptionsItemSelected(item);
    }
    @Override protected void onResume() { super.onResume(); if (mBannerAd != null) mBannerAd.resume(); }
    @Override protected void onPause() { if (mBannerAd != null) mBannerAd.pause(); super.onPause(); }
    @Override protected void onDestroy() {
        if (mBannerAd != null) mBannerAd.destroy();
        if (mWebView != null) { mWebView.removeAllViews(); mWebView.destroy(); }
        super.onDestroy();
    }
    @Override public void onBackPressed() {
        if (mWebView != null && mWebView.canGoBack()) mWebView.goBack();
        else super.onBackPressed();
    }
}
EOF

        # ── PRIVACYPOLICYACTIVITY ────────────────────────────
        cat > app/src/main/java/com/akhtar/areacalculator/PrivacyPolicyActivity.java << 'EOF'
package com.akhtar.areacalculator;
import android.os.Bundle;
import android.webkit.WebView;
import android.webkit.WebViewClient;
import androidx.appcompat.app.AppCompatActivity;
import com.akhtar.areacalculator.databinding.ActivityPrivacyPolicyBinding;
public class PrivacyPolicyActivity extends AppCompatActivity {
    @Override protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        ActivityPrivacyPolicyBinding b = ActivityPrivacyPolicyBinding.inflate(getLayoutInflater());
        setContentView(b.getRoot());
        setSupportActionBar(b.toolbar);
        if (getSupportActionBar() != null) {
            getSupportActionBar().setDisplayHomeAsUpEnabled(true);
            getSupportActionBar().setTitle(R.string.privacy_policy);
        }
        b.privacyWebView.setWebViewClient(new WebViewClient());
        b.privacyWebView.loadUrl("file:///android_asset/privacy_policy.html");
    }
    @Override public boolean onSupportNavigateUp() { onBackPressed(); return true; }
}
EOF

        # ── LAYOUTS ──────────────────────────────────────────
        cat > app/src/main/res/layout/activity_main.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<androidx.coordinatorlayout.widget.CoordinatorLayout
    xmlns:android="http://schemas.android.com/apk/res/android"
    xmlns:app="http://schemas.android.com/apk/res-auto"
    android:layout_width="match_parent"
    android:layout_height="match_parent"
    android:background="#040b12">
    <com.google.android.material.appbar.AppBarLayout
        android:id="@+id/appBarLayout"
        android:layout_width="match_parent"
        android:layout_height="wrap_content"
        android:background="#080f1a">
        <androidx.appcompat.widget.Toolbar
            android:id="@+id/toolbar"
            android:layout_width="match_parent"
            android:layout_height="?attr/actionBarSize"
            android:background="#080f1a"
            app:titleTextColor="#00d4ff"
            app:title="@string/app_name" />
    </com.google.android.material.appbar.AppBarLayout>
    <LinearLayout
        android:layout_width="match_parent"
        android:
